<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spreadsheets</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
  }

  #label {
    font-size: 24px;
    color: white;
    margin-bottom: 10px;
  }

  #clock {
    font-size: 60px;
    color: white;
    margin-bottom: 30px;
  }

  img {
    width: 650px; /* ⬅️ bigger globe */
    max-width: 90vw;
    height: auto;
  }
</style>
</head>

<body>

<div id="label">My time:</div>
<div id="clock"></div>

<img src="globe.gif" alt="globe">

<script>
function updateClock() {
  const options = {
    timeZone: "Europe/Stockholm",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  };

  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString("en-GB", options);
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
